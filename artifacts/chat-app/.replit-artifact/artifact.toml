kind = "web"
previewPath = "/"
title = "Chat Platform"
version = "1.0.0"
id = "artifacts/chat-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18228

[services.development]
run = "pnpm --filter @workspace/chat-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chat-app", "run", "build" ]
publicDir = "artifacts/chat-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18228"
BASE_PATH = "/"
